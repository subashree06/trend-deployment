# ============================================================
# docker-compose.yml – Local development / testing
# Run: docker-compose up
# App will be available at http://localhost:3000
# ============================================================

version: '3.8'

services:

  trend-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trend-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - trend-network

networks:
  trend-network:
    driver: bridge
