# ============================================================
# prometheus.yml – Prometheus scrape configuration
# Used by the monitoring stack in kubernetes/monitoring.yaml
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - "alert.rules.yml"

# Scrape targets
scrape_configs:

  # Monitor the Trend app itself
  - job_name: 'trend-app'
    static_configs:
      - targets: ['trend-app-service.default.svc.cluster.local:80']

  # Monitor Kubernetes nodes
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Monitor Kubernetes pods
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
